<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../img/icon.png">

  <title>Iniciar sesión · FlexArena</title>
<link rel="stylesheet" href="../css/_shared.css"></head>
<body>
<div class="auth-layout">
  <div class="auth-card">
    <a class="brand" href="index.html" style="margin-bottom:1.4rem;display:inline-flex">
      <img src="../img/flexarena.webp" alt="FlexArena" style="height:38px;width:auto">
    </a>

    <h2 style="margin-bottom:.25rem">Iniciar sesión</h2>
    <p class="muted" style="margin-bottom:1.2rem">Accedé al panel de gestión de torneos.</p>

    <form data-validate data-mock data-redirect="05-admin-dashboard.html">
      <div class="form-grid" style="grid-template-columns:1fr;gap:.85rem">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="tu@email.com" required>
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
      </div>
      <div class="form-actions" style="margin-top:1.2rem">
        <a class="btn ghost" href="01-home.html">Volver</a>
        <button type="submit" class="btn primary">Ingresar</button>
      </div>
    </form>

   
  </div>
</div>

<nav class="mockup-nav">
  <a href="index.html">← Índice</a>
  <a href="01-home.html">Home</a>
  <a href="03-login.html" class="current">Login</a>
  <a href="04-registro.html">Registro</a>
  <a href="05-admin-dashboard.html">Admin →</a>
</nav>

<!-- Capa JavaScript modular -->
<script src="../js/app.js"></script>
<script src="../js/forms.js"></script>
</body>
</html>
